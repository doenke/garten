<!doctype html>
<html lang="de" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GardenGlow</title>
  <link rel="stylesheet" href="https://assets.kanonenwiese.de/css/central_style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <meta name="theme-color" content="#355e3b" />
  <style>
    :root{--bg:#f4f7f4;--surface:#fff;--surface-soft:#f6faf6;--text:#142015;--muted:#3d4d42;--primary:#3f8f54;--primary-dark:#2f6d40;--danger:#b64545;--border:#d8e2d8;--shadow:0 10px 30px rgba(27,49,32,.08);--radius:16px;--link:#174c2b;--link-hover:#0f351d;color-scheme:light}
    [data-theme="dark"]{--bg:#121714;--surface:#1a211d;--surface-soft:#202922;--text:#f4faf4;--muted:#c8d7cc;--primary:#6fcb87;--primary-dark:#52a669;--danger:#df6f6f;--border:#334137;--shadow:0 14px 32px rgba(0,0,0,.35);--link:#b9f5c5;--link-hover:#d8ffe0;color-scheme:dark}
    [data-theme="auto"]{color-scheme:light dark}
    @media (prefers-color-scheme: dark){
      [data-theme="auto"]{--bg:#121714;--surface:#1a211d;--surface-soft:#202922;--text:#f4faf4;--muted:#c8d7cc;--primary:#6fcb87;--primary-dark:#52a669;--danger:#df6f6f;--border:#334137;--shadow:0 14px 32px rgba(0,0,0,.35);--link:#b9f5c5;--link-hover:#d8ffe0}
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top left,#dff5e3 0,#f4f7f4 45%,var(--bg) 100%);color:var(--text);font-family:Inter,system-ui,sans-serif}
    .page-wrap{max-width:1140px;margin:0 auto;padding:1rem}
    .site-header{display:flex;justify-content:space-between;align-items:center;gap:1rem;padding:.9rem 1.1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:1.1rem}
    .brand{display:flex;align-items:center;gap:.8rem;text-decoration:none;color:inherit}
    .brand img{height:42px}.brand h1{font-size:1.35rem;margin:0}
    .header-actions{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap}
    .avatar{width:40px;height:40px;border-radius:50%;border:2px solid var(--surface-soft);object-fit:cover}
    .avatar-sm{width:28px;height:28px;border-radius:50%;vertical-align:middle;object-fit:cover}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:1rem}
    .page-breadcrumb{display:flex;flex-wrap:wrap;align-items:center;gap:.35rem;font-size:.9rem;color:var(--muted);margin:0 0 .65rem}
    .page-breadcrumb a{font-weight:600;text-decoration:none}
    .page-breadcrumb .separator{opacity:.6}
    .btn,button{border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#ffffff;font-weight:700;padding:.6rem .95rem;cursor:pointer;text-shadow:0 1px 1px rgba(0,0,0,.25)}
    .btn.secondary{background:var(--surface-soft);color:var(--text);border:1px solid var(--border)}
    .btn.danger{background:linear-gradient(135deg,#d46565,var(--danger))}
    input,select,textarea{width:100%;padding:.62rem .72rem;border:1px solid var(--border);border-radius:10px;background:var(--surface-soft);color:var(--text)}
    input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
    textarea{min-height:90px;resize:vertical}
    a{color:var(--link);font-weight:600;text-underline-offset:2px}
    a:hover{color:var(--link-hover)}
    p,li,label,small,summary{color:var(--text)}
    form.grid{display:grid;gap:.65rem}
    .actions-inline{display:flex;flex-wrap:wrap;gap:.55rem}
    table{width:100%;border-collapse:separate;border-spacing:0 .55rem}
    th{text-align:left;font-size:.85rem;color:var(--muted);padding:.35rem .75rem}
    td{background:var(--surface-soft);padding:.75rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    td:first-child{border-left:1px solid var(--border);border-top-left-radius:10px;border-bottom-left-radius:10px}
    td:last-child{border-right:1px solid var(--border);border-top-right-radius:10px;border-bottom-right-radius:10px}
    .bloom-timeline{margin:.5rem 0 1rem}.timeline-track{display:grid;grid-template-columns:repeat(12,minmax(40px,1fr));gap:.25rem}.timeline-month{padding:.35rem .25rem;border-radius:.5rem;text-align:center;background:#ddd3;font-size:.85rem}.timeline-month.active{background:linear-gradient(135deg,#7fcf75,#4aa85b);color:#fff;font-weight:600;box-shadow:0 1px 4px #0003}.timeline-entry{position:relative;background:var(--surface-soft);border:1px solid var(--border);border-radius:12px;padding:.75rem .75rem 2.2rem .75rem;margin-bottom:.75rem;color:var(--text)}.timeline-entry small,.timeline-entry strong,.timeline-entry p{color:var(--text)}
    .site-footer{padding:.55rem 1rem;background:color-mix(in srgb,var(--surface) 92%, transparent);border-top:1px solid var(--border);display:flex;justify-content:center}
    .footer-inner{display:flex;align-items:center;gap:.5rem}
    .floating-trash{display:flex;justify-content:flex-end;margin:0 0 1rem}
    .floating-trash button{width:42px;height:42px;padding:0;border-radius:999px;display:grid;place-items:center;font-size:1.05rem;line-height:1;background:#fff;color:#8b1e1e;border:1px solid #d9b2b2;box-shadow:0 8px 22px rgba(0,0,0,.18);text-shadow:none}
    .floating-trash button:hover{background:#ffecec}
        @media (max-width:900px){.page-wrap{padding:.8rem .75rem}.site-header{flex-direction:column;align-items:stretch}.brand h1{font-size:1.2rem}}
    @media (max-width:700px){table,thead,tbody,th,td,tr{display:block} thead{display:none} tr{margin-bottom:.7rem} td{border:1px solid var(--border)!important;border-radius:10px!important} td::before{content:attr(data-label);display:block;font-size:.75rem;color:var(--muted);margin-bottom:.2rem;font-weight:600}}
  </style>
</head>
<body>
<div class="page-wrap">
<header class="site-header">
  <a href="/" class="brand"><img src="https://assets.kanonenwiese.de/US_KanonenwieseLogo.svg"><h1>GardenGlow</h1></a>
  <div class="header-actions">
    {% if user %}
      {% if user.avatar_filename %}<img class="avatar" src="/avatars/{{ user.avatar_filename }}">{% elif user.avatar_url %}<img class="avatar" src="{{ user.avatar_url }}">{% endif %}
      <a href="/logout" class="btn secondary">Logout</a>
    {% endif %}
  </div>
</header>
<main>
{% block content %}{% endblock %}
</main>
</div>
<footer class="site-footer">
  <div class="footer-inner">
    <label for="themeSwitch">Theme:</label>
    <select id="themeSwitch"><option value="auto">Auto</option><option value="light">Hell</option><option value="dark">Dunkel</option></select>
  </div>
</footer>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
const s=document.getElementById('themeSwitch');const saved=localStorage.getItem('theme')||'auto';s.value=saved;document.documentElement.dataset.theme=saved;
s.addEventListener('change',()=>{localStorage.setItem('theme',s.value);document.documentElement.dataset.theme=s.value;});
</script>
</body></html>
