{% extends 'base.html' %}
{% block content %}
<section class="card">
<nav class="page-breadcrumb" aria-label="Breadcrumb">
  <a href="/">Übersicht</a>
  <span class="separator" aria-hidden="true">/</span>
  <span aria-current="page">{{ location.name }}</span>
</nav>
<h2>{{ location.name }}</h2>
<button type="button" id="toggle-plant-form" style="margin-bottom:1rem;">Pflanze anlegen</button>
<form method="post" action="/locations/{{location.id}}/plants/new" id="plant-form" class="grid" style="display:none;">
<input name="name" placeholder="Namen" required>
<input name="common_name" placeholder="Umgangssprachlicher Name">
<label>Erstes Pflanzevent (Eingepflanzt): <input type="date" name="planting_date"></label>
<input name="source" placeholder="gekauft bei / bekommen von">
<fieldset><legend>Lichtbedarf (Mehrfachauswahl)</legend><label><input type="checkbox" name="light_need" value="Sonnig"> Sonnig</label><label><input type="checkbox" name="light_need" value="Halbschatten"> Halbschatten</label><label><input type="checkbox" name="light_need" value="Schatten"> Schatten</label></fieldset>
<label>Blütezeit von <select name="bloom_start_month" required><option value="">Monat</option>{% for m in range(1,13) %}<option value="{{ m }}">{{ m }}</option>{% endfor %}</select> bis <select name="bloom_end_month" required><option value="">Monat</option>{% for m in range(1,13) %}<option value="{{ m }}">{{ m }}</option>{% endfor %}</select></label>
<input name="flower_color" placeholder="Blütenfarbe">
<input name="soil" placeholder="Boden">
<input type="number" name="height_without_bloom_cm" min="0" placeholder="Höhe ohne Blüte (cm)">
<input type="number" name="height_with_bloom_cm" min="0" placeholder="Höhe mit Blüte (cm)">
<textarea name="info" placeholder="Weitere Info"></textarea>
<button>Pflanze anlegen</button>
</form>
<script>
  const togglePlantFormButton = document.getElementById('toggle-plant-form');
  const plantForm = document.getElementById('plant-form');
  togglePlantFormButton.addEventListener('click', () => {
    const isHidden = plantForm.style.display === 'none';
    plantForm.style.display = isHidden ? 'block' : 'none';
    togglePlantFormButton.textContent = isHidden ? 'Pflanze anlegen ausblenden' : 'Pflanze anlegen';
  });
</script>
<h3>Pflanzen</h3><ul>{% for p in plants %}<li><a href="/plants/{{p.id}}">{{p.name}}</a></li>{% endfor %}</ul>
<form method="post" action="/locations/{{ location.id }}/delete" onsubmit="return confirm('Location wirklich löschen? Alle enthaltenen Pflanzen werden in den Papierkorb verschoben.');" class="floating-trash">
  <button type="submit" aria-label="Location löschen" title="Location löschen">🗑️</button>
</form>
</section>
{% endblock %}
