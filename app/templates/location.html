{% extends 'base.html' %}
{% block content %}
<section class="card">
<nav class="page-breadcrumb" aria-label="Breadcrumb">
  <a href="/">Übersicht</a>
  <span class="separator" aria-hidden="true">/</span>
  <span aria-current="page">{{ location.name }}</span>
</nav>
<h2>{{ location.name }}</h2>
<h3>Luftbild & Polygon</h3>
<form method="post" action="/map/upload" enctype="multipart/form-data" class="grid" style="margin-bottom:.75rem;">
  <input type="file" name="map_image" accept="image/*">
  <button>Luftbild aktualisieren</button>
</form>
{% if garden_map and garden_map.filename %}
<div style="position:relative;display:inline-block;max-width:100%;margin-bottom:.75rem;">
  <img id="location-map-image" src="/maps/{{ garden_map.filename }}" style="max-width:100%;border-radius:10px;">
  <svg id="location-map-overlay" style="position:absolute;left:0;top:0;width:100%;height:100%;"></svg>
</div>
<form method="post" action="/map/calibration" class="grid" style="margin-bottom:.75rem;">
  <input type="hidden" name="calibration_points" id="calibration-points-field" value='{{ garden_map.calibration_points or "[]" }}'>
  <label>Punkt 1 GPS <input id="gps-1" placeholder="lat,lon"></label>
  <label>Punkt 2 GPS <input id="gps-2" placeholder="lat,lon"></label>
  <button>Kalibrierung speichern</button>
</form>
{% endif %}
<form method="post" action="/locations/{{ location.id }}/map" class="grid" style="margin-bottom:1rem;">
  <input type="hidden" name="polygon_points" id="polygon-points-field" value='{{ location.polygon_points or "[]" }}'>
  <label>Farbe <input type="color" name="color" value="{{ location.color or '#2f6d40' }}"></label>
  <button>Polygon speichern</button>
</form>
<button type="button" id="toggle-plant-form" style="margin-bottom:1rem;">Pflanze anlegen</button>
<form method="post" action="/locations/{{location.id}}/plants/new" id="plant-form" class="grid" style="display:none;">
<input name="name" placeholder="Namen" required>
<input name="common_name" placeholder="Umgangssprachlicher Name">
<label>Erstes Pflanzevent (Eingepflanzt): <input type="date" name="planting_date"></label>
<input name="source" placeholder="gekauft bei / bekommen von">
<fieldset><legend>Lichtbedarf (Mehrfachauswahl)</legend><label><input type="checkbox" name="light_need" value="Sonnig"> Sonnig</label><label><input type="checkbox" name="light_need" value="Halbschatten"> Halbschatten</label><label><input type="checkbox" name="light_need" value="Schatten"> Schatten</label></fieldset>
<label>Blütezeit von <select name="bloom_start_month" required><option value="">Monat</option>{% for m in range(1,13) %}<option value="{{ m }}">{{ m }}</option>{% endfor %}</select> bis <select name="bloom_end_month" required><option value="">Monat</option>{% for m in range(1,13) %}<option value="{{ m }}">{{ m }}</option>{% endfor %}</select></label>
<input name="flower_color" placeholder="Blütenfarbe">
<input name="soil" placeholder="Boden">
<input type="number" name="height_without_bloom_cm" min="0" placeholder="Höhe ohne Blüte (cm)">
<input type="number" name="height_with_bloom_cm" min="0" placeholder="Höhe mit Blüte (cm)">
<textarea name="info" placeholder="Weitere Info"></textarea>
<button>Pflanze anlegen</button>
</form>
<script>
  const locationImage = document.getElementById('location-map-image');
  const locationOverlay = document.getElementById('location-map-overlay');
  const polygonField = document.getElementById('polygon-points-field');
  const calibrationField = document.getElementById('calibration-points-field');
  let polygonPoints = polygonField ? JSON.parse(polygonField.value || '[]') : [];
  let calibrationPoints = calibrationField ? JSON.parse(calibrationField.value || '[]') : [];
  const gps1 = document.getElementById('gps-1');
  const gps2 = document.getElementById('gps-2');

  const renderOverlay = () => {
    if (!locationImage || !locationOverlay) return;
    locationOverlay.setAttribute('viewBox', `0 0 ${locationImage.naturalWidth} ${locationImage.naturalHeight}`);
    const polygon = polygonPoints.map((point) => `${point.x * locationImage.naturalWidth},${point.y * locationImage.naturalHeight}`).join(' ');
    const calibration = calibrationPoints.map((point, index) => `<circle cx="${point.x * locationImage.naturalWidth}" cy="${point.y * locationImage.naturalHeight}" r="7" fill="${index === 0 ? '#ff4d4d' : '#3388ff'}"></circle>`).join('');
    locationOverlay.innerHTML = polygonPoints.length > 2 ? `<polygon points="${polygon}" fill="{{ location.color or '#2f6d40' }}66" stroke="{{ location.color or '#2f6d40' }}" stroke-width="2"></polygon>${calibration}` : calibration;
  };

  if (locationImage && locationOverlay && polygonField) {
    locationImage.addEventListener('load', renderOverlay);
    locationOverlay.addEventListener('click', (event) => {
      const rect = locationOverlay.getBoundingClientRect();
      const x = (event.clientX - rect.left) / rect.width;
      const y = (event.clientY - rect.top) / rect.height;
      if (event.shiftKey && calibrationField) {
        if (calibrationPoints.length >= 2) calibrationPoints = [];
        const gpsValue = calibrationPoints.length === 0 ? (gps1?.value || '') : (gps2?.value || '');
        const [lat, lon] = gpsValue.split(',').map((v) => Number(v.trim()));
        calibrationPoints.push({ x, y, lat, lon });
        calibrationField.value = JSON.stringify(calibrationPoints);
      } else {
        polygonPoints.push({ x, y });
        polygonField.value = JSON.stringify(polygonPoints);
      }
      renderOverlay();
    });
  }

  const togglePlantFormButton = document.getElementById('toggle-plant-form');
  const plantForm = document.getElementById('plant-form');
  togglePlantFormButton.addEventListener('click', () => {
    const isHidden = plantForm.style.display === 'none';
    plantForm.style.display = isHidden ? 'block' : 'none';
    togglePlantFormButton.textContent = isHidden ? 'Pflanze anlegen ausblenden' : 'Pflanze anlegen';
  });
</script>
<h3>Pflanzen</h3><ul>{% for p in plants %}<li><a href="/plants/{{p.id}}">{{p.name}}</a></li>{% endfor %}</ul>
<form method="post" action="/locations/{{ location.id }}/delete" onsubmit="return confirm('Location wirklich löschen? Alle enthaltenen Pflanzen werden in den Papierkorb verschoben.');" class="floating-trash">
  <button type="submit" aria-label="Location löschen" title="Location löschen">🗑️</button>
</form>
</section>
{% endblock %}
