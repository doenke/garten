{% extends 'base.html' %}
{% block content %}
<h2>{{ location.name }}</h2>
<p><a href="/">← Zurück zur Übersicht</a></p>
<form method="post" action="/locations/{{ location.id }}/delete" onsubmit="return confirm('Location wirklich löschen? Alle enthaltenen Pflanzen werden ebenfalls gelöscht.');" style="margin-bottom:1rem;">
  <button type="submit">Location löschen</button>
</form>
<form method="post" action="/locations/{{location.id}}/plants/new">
<input name="name" placeholder="Namen" required>
<input name="common_name" placeholder="Umgangssprachlicher Name">
<label>Erstes Pflanzevent (Eingepflanzt): <input type="date" name="planting_date"></label>
<input name="source" placeholder="gekauft bei / bekommen von">
<select name="light_need"><option>Sonnig</option><option>Halbschatten</option><option>Schatten</option></select>
<input name="bloom_months" placeholder="Blühmonate (z.B. 3,4,5)">
<input name="flower_color" placeholder="Blütenfarbe">
<textarea name="info" placeholder="Weitere Info"></textarea>
<button>Pflanze anlegen</button>
</form>
<ul>{% for p in plants %}<li><a href="/plants/{{p.id}}">{{p.name}}</a></li>{% endfor %}</ul>
{% endblock %}
