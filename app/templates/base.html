<!doctype html>
<html lang="de" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GardenGlow</title>
  <link rel="stylesheet" href="https://assets.kanonenwiese.de/css/central_style.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <meta name="theme-color" content="#355e3b" />
  <style>footer{position:fixed;bottom:0;left:0;right:0;background:#0001;padding:.5rem} .avatar{width:36px;height:36px;border-radius:50%} .avatar-sm{width:24px;height:24px;border-radius:50%;vertical-align:middle} .bloom-timeline{margin:.5rem 0 1rem}.timeline-track{display:grid;grid-template-columns:repeat(12,minmax(40px,1fr));gap:.25rem}.timeline-month{padding:.35rem .25rem;border-radius:.5rem;text-align:center;background:#ddd3;font-size:.85rem}.timeline-month.active{background:linear-gradient(135deg,#7fcf75,#4aa85b);color:#fff;font-weight:600;box-shadow:0 1px 4px #0003}</style>
</head>
<body>
<header style="display:flex;justify-content:space-between;align-items:center;">
  <div style="display:flex;align-items:center;gap:1rem"><img src="https://assets.kanonenwiese.de/US_KanonenwieseLogo.svg" style="height:40px"><h1><a href="/" style="text-decoration:none;color:inherit;">GardenGlow</a></h1></div>
  <div>
    {% if user %}
      {% if user.avatar_filename %}<img class="avatar" src="/avatars/{{ user.avatar_filename }}">{% elif user.avatar_url %}<img class="avatar" src="{{ user.avatar_url }}">{% endif %}
      <a href="/logout">Logout</a>
    {% endif %}
  </div>
</header>
<main style="padding-bottom:4rem">
{% block content %}{% endblock %}
</main>
<footer>
  <label>Theme:</label>
  <select id="themeSwitch"><option value="auto">Auto</option><option value="light">Hell</option><option value="dark">Dunkel</option></select>
</footer>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
const s=document.getElementById('themeSwitch');const saved=localStorage.getItem('theme')||'auto';s.value=saved;document.documentElement.dataset.theme=saved;
s.addEventListener('change',()=>{localStorage.setItem('theme',s.value);document.documentElement.dataset.theme=s.value;});
</script>
</body></html>
